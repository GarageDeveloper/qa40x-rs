# Build installable apps (the downloadable artifacts).
#
# Runs on GitHub-hosted runners (free minutes on a public repo). Building
# installers is heavy (Rust recompiles + bundling), so it does NOT run on every
# push:
#
#   - push to `main`      -> "smoke" set: macOS ARM64 + Linux x64
#   - push a tag `v*`     -> FULL set (all platforms) for a release
#   - manual "Run workflow" -> smoke by default; tick "all_platforms" for the full set
#
# On tag builds the macOS artifacts are signed with a Developer ID and notarized
# using the repo secrets (see the signing steps below). Fork PRs never receive
# those secrets, and hosted runners are ephemeral, so this is safe on a public
# repo. Your cheap per-push safety net is `ci.yml` (compile + test on Linux).
#
# To get the files: Actions tab -> "Build apps" -> open the run -> "Artifacts".

name: Build apps

on:
  workflow_dispatch: # manual "Run workflow" button
    inputs:
      all_platforms:
        description: "Build ALL platforms (default builds only macOS + Windows ARM64)"
        type: boolean
        default: false
  push:
    branches: ["main"] # merges to main -> smoke build (macOS + Windows ARM64)
    tags: ["v*"] # release tag -> full build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Decide which platforms to build, based on the event -------------------
  setup:
    name: Select platforms
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          # Full set = all 5 targets (used for releases / when explicitly asked).
          FULL='{"include":[
            {"name":"windows-arm64","os":"windows-latest","target":"aarch64-pc-windows-msvc"},
            {"name":"windows-x64","os":"windows-latest","target":"x86_64-pc-windows-msvc"},
            {"name":"macos-arm64","os":"macos-latest","target":"aarch64-apple-darwin"},
            {"name":"macos-x64-legacy","os":"macos-latest","target":"x86_64-apple-darwin"},
            {"name":"linux-x64","os":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu"},
            {"name":"linux-arm64","os":"ubuntu-22.04-arm","target":"aarch64-unknown-linux-gnu"}
          ]}'
          # Smoke set = macOS ARM64 + Linux x64, the quick per-merge check.
          SMOKE='{"include":[
            {"name":"macos-arm64","os":"macos-latest","target":"aarch64-apple-darwin"},
            {"name":"linux-x64","os":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu"}
          ]}'
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event.inputs.all_platforms }}" = "true" ]; then
            echo "Selected: FULL (all platforms)"
            MATRIX="$FULL"
          else
            echo "Selected: SMOKE (macOS ARM64 + Linux x64)"
            MATRIX="$SMOKE"
          fi
          # Collapse to one line for the output.
          echo "matrix=$(echo "$MATRIX" | tr -d '\n' | tr -s ' ')" >> "$GITHUB_OUTPUT"

  # ---- Build each selected platform ------------------------------------------
  build:
    needs: setup
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # allow creating/uploading a GitHub Release on tag builds
    strategy:
      fail-fast: false # one target failing must not cancel the others
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain (+ target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Tauri's Linux build needs GTK/WebKit; hidapi needs libudev; the AppImage
      # bundler embeds xdg-open (tauri-plugin-opener).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          if dpkg -s libwebkit2gtk-4.1-dev libudev-dev patchelf xdg-utils >/dev/null 2>&1; then
            echo "System deps already present — skipping apt-get"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libgtk-3-dev libssl-dev libudev-dev patchelf xdg-utils

      # Release signing (tag builds only): import the Developer ID cert into a
      # throwaway keychain and materialise the App Store Connect API key, so
      # both the Tauri app-signing below AND the DMG-signing later can use them.
      # The keychain + key file are removed by the Cleanup step (always).
      - name: Set up macOS signing keychain
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/qa40x-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT_P12="$RUNNER_TEMP/certificate.p12"
          API_KEY="$RUNNER_TEMP/AuthKey.p8"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no auto-lock mid-build
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list (keep the login keychain).
          security list-keychains -d user -s "$KEYCHAIN" "$HOME/Library/Keychains/login.keychain-db"

          rm -f "$CERT_P12"
          # Export to the job env so the Tauri build (and later steps) pick these
          # up ONLY on tag builds — this step is the sole place they are defined,
          # so on smoke builds they are simply absent and Tauri skips signing.
          {
            echo "SIGN_KEYCHAIN=$KEYCHAIN"
            echo "APPLE_API_KEY_PATH=$API_KEY"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_API_KEY=$APPLE_API_KEY"
          } >> "$GITHUB_ENV"

      # The official Tauri action: builds the frontend, compiles Rust for the
      # target, and bundles the installer. It reads src-tauri/tauri.conf.json.
      # (Windows ARM64 cross-compiles from the x64 runner; if that runner ever
      # lacks the ARM64 MSVC linker, switch its `os` to `windows-11-arm`.)
      # macOS bundles only the .app here: Tauri's bundle_dmg.sh drives Finder
      # via AppleScript for its styled DMG, which cannot run in the runner's
      # headless launchd session (it hangs, then fails). The DMG is packaged
      # by the dmgbuild step below instead — for smoke AND tag builds.
      # On tag+macOS the keychain step above exported APPLE_SIGNING_IDENTITY /
      # APPLE_API_* into the job env, so Tauri signs the .app (hardened runtime)
      # and notarizes+staples it via the API key; the identity comes from the
      # keychain (no APPLE_CERTIFICATE needed here). On smoke builds those vars
      # are ABSENT (not empty) — the previous inline `|| ''` defined them as
      # empty strings, which made Tauri try to sign with identity "" and fail.
      - name: Build the app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}${{ runner.os == 'macOS' && ' --bundles app' || '' }}
          # On a `v*` tag, create (once) a DRAFT GitHub Release and attach every
          # platform's installer to it; each matrix job uploads to the same
          # release. On non-tag builds tagName is empty, so no release is made —
          # just the workflow artifacts below. Review the draft, then Publish.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('qa40x-rs Audio Analyzer {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # The packages must carry the QA40x udev rule and reload udev on
      # (un)install — regressions here would silently bring back the manual
      # "create the rules file yourself" step.
      - name: Verify Linux packages (udev rule + scripts)
        if: runner.os == 'Linux'
        run: |
          DEB=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb | head -1)
          dpkg-deb -c "$DEB" | grep -q "udev/rules.d/99-qa40x.rules" \
            || { echo "::error::deb is missing the udev rule"; exit 1; }
          dpkg-deb -I "$DEB" postinst | grep -q udevadm \
            || { echo "::error::deb postinst does not reload udev"; exit 1; }
          dpkg-deb -I "$DEB" postrm | grep -q udevadm \
            || { echo "::error::deb postrm does not reload udev"; exit 1; }
          if command -v rpm >/dev/null 2>&1; then
            RPM=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm | head -1)
            rpm -qp --list "$RPM" 2>/dev/null | grep -q "99-qa40x.rules" \
              || { echo "::error::rpm is missing the udev rule"; exit 1; }
            rpm -qp --scripts "$RPM" 2>/dev/null | grep -q udevadm \
              || { echo "::error::rpm scripts do not reload udev"; exit 1; }
          else
            echo "rpm tool not installed on this runner — rpm checks skipped"
          fi
          echo "udev rule + reload scripts verified"

      # Resolve the version/arch-specific DMG name, volume name and paths once,
      # for every downstream macOS step. The VOLUME NAME must be unique per
      # artifact: dmgbuild bakes it into the background's alias, so if two
      # mounted volumes share a name the second mounts as "… 1" and the alias
      # (hence the background image) breaks. Version+arch makes it unique.
      - name: Resolve macOS DMG names
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then VER="${GITHUB_REF_NAME#v}"; else VER="smoke"; fi
          case "${{ matrix.target }}" in
            x86_64-apple-darwin) ARCH="x86_64-legacy"; VOL="qa40x-rs Audio Analyzer ${VER} (Intel)" ;;
            *)                   ARCH="aarch64";       VOL="qa40x-rs Audio Analyzer ${VER}" ;;
          esac
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          {
            echo "MAC_VER=$VER"
            echo "MAC_VOL=$VOL"
            echo "MAC_APP=$BUNDLE/macos/qa40x-rs Audio Analyzer.app"
            echo "MAC_DMG=$BUNDLE/dmg/qa40x-rs Audio Analyzer_${VER}_${ARCH}.dmg"
          } >> "$GITHUB_ENV"

      # dmgbuild writes the .DS_Store directly (no Finder/AppleScript), so the
      # styled drag-to-Applications layout + install README work headless.
      # /usr/bin/python3 (Xcode CLT) on purpose: the asdf python lacks SSL.
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          /usr/bin/python3 -c "import dmgbuild" 2>/dev/null \
            || /usr/bin/python3 -m pip install --user --quiet dmgbuild
          mkdir -p "$(dirname "$MAC_DMG")"
          /usr/bin/python3 -m dmgbuild -s packaging/dmg/settings.py \
            -D "app=$MAC_APP" "$MAC_VOL" "$MAC_DMG"

      # The .app was already signed + notarized + stapled by Tauri; the DMG that
      # wraps it still needs its own Developer ID signature, notarization and
      # staple so the downloaded disk image opens with no Gatekeeper prompt.
      - name: Sign, notarize & staple the DMG (tags)
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          codesign --force --timestamp --keychain "$SIGN_KEYCHAIN" \
            --sign "$APPLE_SIGNING_IDENTITY" "$MAC_DMG"
          # --wait blocks until Apple returns a terminal state; --timeout caps
          # that at 1h so a slow notary backend can't pin the runner
          # indefinitely (the step fails cleanly instead; staple/verify manually).
          xcrun notarytool submit "$MAC_DMG" \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" --team-id "$APPLE_TEAM_ID" \
            --timeout 1h --wait
          xcrun stapler staple "$MAC_DMG"

      - name: Verify signature & notarization (tags)
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "$MAC_APP"
          # Must report: accepted / source=Notarized Developer ID
          spctl --assess -t exec -vvv "$MAC_APP" 2>&1 | tee /tmp/spctl-app.txt
          grep -q "source=Notarized Developer ID" /tmp/spctl-app.txt
          xcrun stapler validate "$MAC_APP"
          xcrun stapler validate "$MAC_DMG"
          spctl --assess -t open --context context:primary-signature -vvv "$MAC_DMG"

      # On tag builds, attach the DMG to the draft release tauri-action just
      # created (with --bundles app it only uploaded the .app archive).
      # Draft releases can't be resolved via /releases/tags/<tag>, hence the
      # list + filter; the asset name is URL-encoded (it contains spaces).
      - name: Attach DMG to the draft release (tags)
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REL_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -q ".[] | select(.tag_name == \"${GITHUB_REF_NAME}\") | .id" | head -1)
          if [ -z "$REL_ID" ]; then
            echo "::error::no release found for tag ${GITHUB_REF_NAME}"; exit 1
          fi
          NAME=$(basename "$MAC_DMG" | /usr/bin/python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read().strip()))")
          gh api --method POST \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${REL_ID}/assets?name=${NAME}" \
            --input "$MAC_DMG"

      # Publish the produced installers/bundles as a downloadable artifact.
      # Installers only — bundle/**/* would also ship the AppImage build tree
      # (a full duplicate of the app), ballooning private-repo storage costs.
      # Short retention for the same reason: smoke artifacts age fast.
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qa40x-rs-${{ matrix.name }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/*.exe

      # Remove the signing keychain + API key from the runner, whether the
      # build passed or failed.
      - name: Clean up signing material
        if: always() && runner.os == 'macOS' && github.ref_type == 'tag'
        run: |
          [ -n "${SIGN_KEYCHAIN:-}" ] && security delete-keychain "$SIGN_KEYCHAIN" 2>/dev/null || true
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db" 2>/dev/null || true
          [ -n "${APPLE_API_KEY_PATH:-}" ] && rm -f "$APPLE_API_KEY_PATH" || true
          rm -f "$RUNNER_TEMP/certificate.p12" || true
          echo "signing material cleaned"
