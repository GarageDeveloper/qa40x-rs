# Auto-merge safe Dependabot updates.
#
# When Dependabot opens a PR for a *minor* or *patch* update (or a group of them),
# this enables GitHub's auto-merge on it — so the PR merges ITSELF once the
# required CI checks pass. MAJOR / breaking updates are deliberately NOT
# auto-merged; they stay open for review.
#
# NOTE: GitHub's auto-merge is NOT available on private repos on the free plan.
# This workflow is therefore DORMANT for now — the merge step no-ops gracefully
# (no red X). It activates by itself once the repo is public (auto-merge is free
# there), provided these two settings are on:
#   1. Settings -> General -> Pull Requests -> "Allow auto-merge".
#   2. A REQUIRED status check on `main` (the CI jobs) for auto-merge to wait on.

name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only ever act on Dependabot's own PRs.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Read Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor & patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr merge --auto --squash "$PR_URL" || \
            echo "::notice::Auto-merge unavailable (needs a public repo or a paid plan + 'Allow auto-merge'). Dormant for now."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
