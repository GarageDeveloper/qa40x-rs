name: Bug report
description: Something is wrong (crash, wrong measurement, UI glitch)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Security issue? Please do NOT file it here — use GitHub's private
        vulnerability reporting (see SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you did, what you expected, what you got instead.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & firmware
      placeholder: "QA403, firmware v60 (or: no device connected)"
  - type: textarea
    id: measurement
    attributes:
      label: Measurement context (if applicable)
      description: >
        Setup (loopback / DUT), signal, and — ideally — what the official
        QA40x app reports for the same signal vs. what qa40x-rs reports.
  - type: input
    id: version
    attributes:
      label: qa40x-rs version & OS
      placeholder: "v0.1.0 on macOS 15.5"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Anything from the console or a screenshot of the issue.
